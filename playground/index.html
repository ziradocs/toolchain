<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SlideLang / DocLang Playground</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --fg: #1a1a1a;
    --panel: #f5f5f7;
    --border: #d8d8dc;
    --accent: #3366cc;
    --error: #c0392b;
    --ok: #1e8e3e;
    --info: #6c757d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --fg: #eaeaea;
      --panel: #2a2a2d;
      --border: #3d3d40;
      --accent: #6ea8ff;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--fg);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  header h1 { font-size: 1rem; margin: 0; font-weight: 600; }
  header select, header button {
    font: inherit;
    padding: 0.3rem 0.5rem;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--fg);
  }
  header button { cursor: pointer; }
  .status { margin-left: auto; font-size: 0.85rem; }
  .status-ok { color: var(--ok); }
  .status-error { color: var(--error); }
  .status-info { color: var(--info); }
  main {
    flex: 1;
    display: flex;
    min-height: 0;
  }
  .pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .pane + .pane { border-left: 1px solid var(--border); }
  textarea#source {
    flex: 1;
    border: none;
    resize: none;
    padding: 1rem;
    font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--bg);
    color: var(--fg);
    outline: none;
  }
  iframe#preview {
    flex: 1;
    border: none;
    background: white;
  }
  #diagnostics-panel {
    max-height: 30%;
    overflow-y: auto;
    border-top: 1px solid var(--border);
    background: var(--panel);
    padding: 0.5rem;
    font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .diag { padding: 0.15rem 0; }
  .diag-error { color: var(--error); }
  .diag-warning { color: #b8860b; }
  .diag-info { color: var(--info); }
  .diag-empty { color: var(--info); font-style: italic; }
</style>
</head>
<body>
<header>
  <h1>SlideLang / DocLang Playground</h1>
  <select id="format">
    <option value="slidelang">SlideLang (presentation)</option>
    <option value="doclang">DocLang (document)</option>
  </select>
  <select id="sample">
    <option value="slidelang-flex">Sample: flex mode</option>
    <option value="slidelang-strict">Sample: strict mode</option>
  </select>
  <select id="theme" title="Theme (SlideLang only)"></select>
  <button id="lint-btn" title="Full lint pass (SlideLang only)">Lint</button>
  <span id="status" class="status">Loading...</span>
</header>
<main>
  <section class="pane">
    <textarea id="source" spellcheck="false"></textarea>
  </section>
  <section class="pane">
    <!-- allow-same-origin is required: the generator's navigation JS uses
         session/local storage to remember slide position, which throws in a
         fully opaque-origin sandbox (allow-scripts alone) and silently
         aborts before showing any slide. Content here is always the user's
         own input rendered locally — this is the same trust level as
         typical live-preview tools (CodeSandbox, JSFiddle), not arbitrary
         third-party content. -->
    <iframe id="preview" sandbox="allow-scripts allow-same-origin"></iframe>
    <div id="diagnostics-panel">
      <div id="diagnostics"></div>
    </div>
  </section>
</main>
<script src="wasm_exec.js"></script>
<script src="playground.js"></script>
</body>
</html>
